<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>解魔方 - 乐玩魔方</title>
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/cube.js"></script>
  
  
  
  
  <script src="js/kociemba_solver.js"></script>
  <script src="js/solver_kociemba.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 预计算求解器剪枝表（仅需一次），避免首次求解卡顿/失败
    (function () {
      try {
        if (window.SolverModule && window.SolverModule.Cube && window.SolverModule.Cube.initSolver) {
          window.SolverModule.Cube.initSolver();
        }
      } catch (e) { /* 忽略，求解时再尝试 */ }
    })();
  </script>
</head>
<body>
  <div class="page solve-page" id="app">
    <div class="nav-bar">
      <button class="nav-back" onclick="location.href='index.html'">‹</button>
      <div class="nav-title">解魔方</div>
    </div>
    <div id="solvingSection" class="solving-section" style="display:none;">
      <div class="solving-icon">🔄</div>
      <div class="solving-text">正在求解魔方...</div>
      <div class="solving-sub">算法正在搜索最优解法</div>
    </div>
    <div id="errorSection" class="error-section" style="display:none;">
      <div class="error-icon">⚠️</div>
      <div class="error-text" id="errorText"></div>
      <button class="btn-primary" onclick="location.href='index.html'">返回首页</button>
    </div>
    <div id="solutionSection" style="display:none;">
      <div class="solution-progress">
        <div class="progress-bar-fill" id="progressFill" style="width:0%;"></div>
      </div>
      <div class="step-text" id="stepText"></div>
      <div class="move-highlight" id="moveHighlight" style="display:none;"></div>
      <div class="cube-all-faces" id="cubeAllFaces"></div>
      <div class="nav-buttons" id="navButtons">
        <div class="nav-row">
          <button class="btn-secondary" id="prevStepBtn" onclick="prevStep()">← 上一步</button>
          <button class="btn-primary" id="nextStepBtn" onclick="nextStep()">下一步 →</button>
        </div>
      </div>
      <div id="solvedSection" class="solved-section" style="display:none;">
        <div class="solved-icon">🎉</div>
        <div class="solved-text">魔方已还原！</div>
        <div class="nav-row">
          <button class="btn-secondary" onclick="restart()">重看步骤</button>
          <button class="btn-primary" onclick="location.href='index.html'">返回首页</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var cubeState = null, solution = [], currentStep = -1, totalSteps = 0;
    var FACE_LABELS = ["上(U)","下(D)","前(F)","后(B)","右(R)","左(L)"];
    var FACE_DISPLAY_ORDER = [0,2,4,1,3,5];

    function init() {
      if (!CubeState || !CubeState.cubeData) {
        showError("没有魔方数据，请先通过拍照识别或手动输入采集魔方颜色");
        return;
      }
      cubeState = CubeState.cubeData.slice();
      startSolve();
    }

    function startSolve() {
      document.getElementById("solvingSection").style.display = "flex";
      setTimeout(function() {
        try {
          var result = CubeSolver.solve(cubeState);
          if (result.error) {
            showError(result.error);
            return;
          }
          solution = result.solution;
          totalSteps = solution.length;
          document.getElementById("solvingSection").style.display = "none";
          document.getElementById("solutionSection").style.display = "block";
          if (totalSteps === 0) {
            showSolved();
          } else {
            goToStep(0);
          }
        } catch (err) {
          showError("求解失败: " + (err.message || "未知错误"));
        }
      }, 100);
    }

    function goToStep(stepIndex) {
      if (stepIndex < 0 || stepIndex >= totalSteps) return;
      var move = solution[stepIndex];
      var displayState = cubeState.slice();
      for (var i = 0; i <= stepIndex; i++) {
        displayState = CubeEngine.applyMove(displayState, solution[i]);
      }
      var stepText = CubeSolver.getStepText(move, stepIndex + 1, totalSteps);
      document.getElementById("stepText").textContent = stepText;

      var base = move.replace("'","").replace("2","");
      var fi = CubeEngine.FACE_SHORT.indexOf(base);
      if (fi >= 0) {
        document.getElementById("moveHighlight").textContent = "需要转动：" + CubeEngine.FACE_NAMES[fi];
        document.getElementById("moveHighlight").style.display = "block";
      }

      renderFaceViews(displayState);

      document.getElementById("progressFill").style.width = ((stepIndex + 1) / totalSteps * 100).toFixed(0) + "%";

      document.getElementById("prevStepBtn").className = "btn-secondary" + (stepIndex <= 0 ? " disabled" : "");
      document.getElementById("nextStepBtn").className = "btn-primary" + (stepIndex >= totalSteps - 1 ? " disabled" : "");

      currentStep = stepIndex;

      if (stepIndex === totalSteps - 1) {
        showSolved();
      } else {
        document.getElementById("solvedSection").style.display = "none";
        document.getElementById("navButtons").style.display = "block";
      }
    }

    function renderFaceViews(state) {
      var container = document.getElementById("cubeAllFaces");
      container.innerHTML = "";
      for (var oi = 0; oi < FACE_DISPLAY_ORDER.length; oi++) {
        var f = FACE_DISPLAY_ORDER[oi];
        var fv = document.createElement("div"); fv.className = "face-view";
        var label = document.createElement("div"); label.className = "face-label";
        label.textContent = FACE_LABELS[f];
        fv.appendChild(label);
        var grid = document.createElement("div"); grid.className = "mini-grid";
        for (var r = 0; r < 3; r++) {
          var row = document.createElement("div"); row.className = "mini-row";
          for (var c = 0; c < 3; c++) {
            var cell = document.createElement("div"); cell.className = "mini-cell";
            if (r === 1 && c === 1) cell.className += " center";
            var idx = CubeEngine.FS[f] + r * 3 + c;
            cell.style.backgroundColor = CubeEngine.COLOR_HEX[state[idx]];
            row.appendChild(cell);
          }
          grid.appendChild(row);
        }
        fv.appendChild(grid);
        container.appendChild(fv);
      }
    }

    function showSolved() {
      document.getElementById("solvedSection").style.display = "flex";
      document.getElementById("navButtons").style.display = "none";
    }

    function showError(msg) {
      document.getElementById("solvingSection").style.display = "none";
      document.getElementById("errorSection").style.display = "flex";
      document.getElementById("errorText").textContent = msg;
    }

    function nextStep() {
      if (currentStep >= totalSteps - 1) return;
      goToStep(currentStep + 1);
    }

    function prevStep() {
      if (currentStep <= 0) return;
      goToStep(currentStep - 1);
    }

    function restart() {
      goToStep(0);
    }

    init();
  </script>
</body>
</html>
