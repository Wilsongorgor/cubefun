<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>乐玩魔方</title>
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="page">
    <div class="logo-section">
      <img src="images/icon.png" class="cube-icon-img" alt="乐玩魔方">
      <div class="app-title">乐玩魔方</div>
      <div class="app-subtitle">快乐转动，轻松还原</div>
    </div>
    <div class="mode-section">
      <div class="mode-card" onclick="location.href='camera.html'">
        <div class="mode-icon">📷</div>
        <div class="mode-info">
          <div class="mode-title">拍照识别</div>
          <div class="mode-desc">用相机扫描魔方各面颜色，自动识别</div>
        </div>
        <div class="mode-arrow">›</div>
      </div>
      <div class="mode-card" onclick="location.href='manual.html'">
        <div class="mode-icon">✍️</div>
        <div class="mode-info">
          <div class="mode-title">手动输入</div>
          <div class="mode-desc">点击格子填入魔方各面颜色</div>
        </div>
        <div class="mode-arrow">›</div>
      </div>
    </div>
    <div class="tip-section">
      <div class="tip-title">💡 使用提示</div>
      <div class="tip-item">· 把魔方朝向你的那一面填好，再按提示向右/向左/向上/向下翻转</div>
      <div class="tip-item">· 拍照时让九宫格对准魔方这一面，识别后可手动修正</div>
      <div class="tip-item">· 6 个面都记录完即可自动求解</div>
    </div>
  </div>
</body>
</html>
