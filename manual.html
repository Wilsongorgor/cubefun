<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手动输入 - 乐玩魔方</title>
  <link rel="icon" href="images/icon.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/cube.js"></script>
  <script src="js/app.js"></script>
</head>
<body>
  <div class="page manual-page" id="app">
    <div class="nav-bar">
      <button class="nav-back" onclick="history.back()">‹</button>
      <div class="nav-title">手动输入</div>
    </div>

    <div class="hint-text">拖动旋转魔方，点击任意一面填入它的 9 个颜色。六面都填完即可求解。</div>
    <div class="cube-progress" id="cubeProgress">已填 0 / 6 面</div>

    <div class="cube-scene" id="cubeScene">
      <div class="cube" id="cube3d">
        <div class="cube-face f-U" data-face="0"></div>
        <div class="cube-face f-D" data-face="1"></div>
        <div class="cube-face f-F" data-face="2"></div>
        <div class="cube-face f-B" data-face="3"></div>
        <div class="cube-face f-R" data-face="4"></div>
        <div class="cube-face f-L" data-face="5"></div>
      </div>
    </div>

    <div class="editor-panel hidden" id="editorPanel">
      <div class="editor-title" id="editorTitle">编辑面</div>
      <div class="editor-sub">先点格子，再点下方颜色</div>
      <div class="editor-grid" id="editorGrid"></div>
      <div class="color-picker">
        <div class="picker-swatches" id="editorPicker"></div>
      </div>
      <div class="editor-actions">
        <button class="btn-primary" onclick="saveFace()">保存这一面 ✓</button>
        <div class="action-row">
          <button class="btn-secondary" onclick="closeEditor()">取消</button>
          <button class="btn-small danger" onclick="clearFace()">清空</button>
        </div>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn-primary" id="solveBtn" onclick="trySolve()" style="display:none;">✅ 六面完成，开始求解</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var COLORS = [
      { hex: "#ffffff", name: "白" }, { hex: "#ffd500", name: "黄" },
      { hex: "#00b16a", name: "绿" }, { hex: "#0051ba", name: "蓝" },
      { hex: "#b71234", name: "红" }, { hex: "#ff5800", name: "橙" }
    ];
    var FACE_NAMES = ["上面(U)", "下面(D)", "前面(F)", "后面(B)", "右面(R)", "左面(L)"];

    // cubeFaces[faceIndex] = [9 colors], -1 = 未填
    var cubeFaces = [];
    for (var f = 0; f < 6; f++) cubeFaces.push([-1,-1,-1,-1,-1,-1,-1,-1,-1]);
    var editingFace = -1;
    var tempFill = -1;

    // ---- 构建 3D 面的贴纸 ----
    function buildCubeStickers() {
      var faces = document.querySelectorAll(".cube-face");
      faces.forEach(function (faceEl) {
        var fi = parseInt(faceEl.getAttribute("data-face"), 10);
        faceEl.innerHTML = "";
        for (var i = 0; i < 9; i++) {
          var stk = document.createElement("div");
          stk.className = "stk";
          var col = cubeFaces[fi][i];
          stk.style.backgroundColor = (col >= 0) ? COLORS[col].hex : "#444";
          faceEl.appendChild(stk);
        }
        faceEl.classList.toggle("recorded", cubeFaces[fi].indexOf(-1) < 0);
      });
      document.getElementById("cubeProgress").textContent = "已填 " + recordedCount() + " / 6 面";
      document.getElementById("solveBtn").style.display = (recordedCount() === 6) ? "block" : "none";
    }

    function recordedCount() {
      var n = 0;
      for (var f = 0; f < 6; f++) if (cubeFaces[f].indexOf(-1) < 0) n++;
      return n;
    }

    // ---- 点击某个面打开编辑 ----
    function openEditor(faceIndex) {
      editingFace = faceIndex;
      tempFill = -1;
      document.getElementById("editorTitle").textContent = "编辑：" + FACE_NAMES[faceIndex];
      renderEditorGrid();
      renderEditorPicker();
      document.getElementById("editorPanel").classList.remove("hidden");
      document.querySelectorAll(".cube-face").forEach(function (el) {
        el.classList.toggle("active", parseInt(el.getAttribute("data-face"), 10) === faceIndex);
      });
    }

    function closeEditor() {
      editingFace = -1;
      document.getElementById("editorPanel").classList.add("hidden");
      document.querySelectorAll(".cube-face").forEach(function (el) { el.classList.remove("active"); });
    }

    function renderEditorGrid() {
      var container = document.getElementById("editorGrid");
      container.innerHTML = "";
      for (var r = 0; r < 3; r++) {
        var row = document.createElement("div"); row.className = "editor-row";
        for (var c = 0; c < 3; c++) {
          var idx = r * 3 + c;
          var cell = document.createElement("div");
          cell.className = "editor-cell" + (tempFill === idx ? " selected" : "");
          var col = cubeFaces[editingFace][idx];
          cell.style.backgroundColor = (col >= 0) ? COLORS[col].hex : "#eee";
          cell.onclick = (function(i) { return function() { tempFill = i; renderEditorGrid(); renderEditorPicker(); }; })(idx);
          row.appendChild(cell);
        }
        container.appendChild(row);
      }
    }

    function renderEditorPicker() {
      var container = document.getElementById("editorPicker");
      container.innerHTML = "";
      for (var i = 0; i < COLORS.length; i++) {
        var sw = document.createElement("div");
        sw.className = "color-swatch";
        sw.style.backgroundColor = COLORS[i].hex;
        sw.onclick = (function(idx) { return function() {
          if (tempFill < 0) { showToast("请先点要填的格子"); return; }
          cubeFaces[editingFace][tempFill] = idx;
          tempFill = -1;
          renderEditorGrid();
        }; })(i);
        var label = document.createElement("div");
        label.className = "swatch-name"; label.textContent = COLORS[i].name;
        sw.appendChild(label);
        container.appendChild(sw);
      }
    }

    function saveFace() {
      for (var i = 0; i < 9; i++) if (cubeFaces[editingFace][i] < 0) { showToast("请填完 9 格"); return; }
      closeEditor();
      buildCubeStickers();
      showToast("已保存，可继续填其它面");
    }

    function clearFace() {
      cubeFaces[editingFace] = [-1,-1,-1,-1,-1,-1,-1,-1,-1];
      tempFill = -1;
      renderEditorGrid();
      buildCubeStickers();
    }

    function trySolve() {
      for (var f = 0; f < 6; f++) {
        if (cubeFaces[f].indexOf(-1) >= 0) { showToast("还有面没填完"); return; }
      }
      var state = new Array(54);
      for (var pf = 0; pf < 6; pf++) {
        for (var i = 0; i < 9; i++) state[CubeEngine.FS[pf] + i] = cubeFaces[pf][i];
      }
      CubeState.cubeData = state;
      CubeState.scanMode = "manual";
      location.href = "solve.html";
    }

    // ---- 拖动旋转 ----
    (function () {
      var scene = document.getElementById("cubeScene");
      var cube = document.getElementById("cube3d");
      var rx = -25, ry = -35, dragging = false, lx = 0, ly = 0;
      function apply() { cube.style.transform = "rotateX(" + rx + "deg) rotateY(" + ry + "deg)"; }
      scene.addEventListener("pointerdown", function (e) {
        dragging = true; lx = e.clientX; ly = e.clientY; scene.classList.add("dragging");
        scene.setPointerCapture(e.pointerId);
      });
      scene.addEventListener("pointermove", function (e) {
        if (!dragging) return;
        ry += (e.clientX - lx) * 0.6; rx -= (e.clientY - ly) * 0.6;
        rx = Math.max(-90, Math.min(90, rx));
        lx = e.clientX; ly = e.clientY; apply();
      });
      scene.addEventListener("pointerup", function (e) { dragging = false; scene.classList.remove("dragging"); });
      scene.addEventListener("pointercancel", function () { dragging = false; scene.classList.remove("dragging"); });
      // 点击面（非拖动）打开编辑
      scene.addEventListener("click", function (e) {
        if (Math.abs(e.movementX) > 3 || Math.abs(e.movementY) > 3) return;
        var faceEl = e.target.closest(".cube-face");
        if (faceEl) openEditor(parseInt(faceEl.getAttribute("data-face"), 10));
      });
      apply();
    })();

    function showToast(m) { var t = document.getElementById("toast"); t.textContent = m; t.className = "toast show"; setTimeout(function() { t.className = "toast"; }, 2000); }

    buildCubeStickers();
  </script>
</body>
</html>
